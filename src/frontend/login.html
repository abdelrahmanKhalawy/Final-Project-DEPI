<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Login | SehhaTech</title>

        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "secondary-fixed-dim": "#76d6d5", "tertiary-container": "#003e34", "tertiary-fixed": "#afefdf",
              "surface-variant": "#e0e3e5", "primary": "#002045", "on-primary": "#ffffff",
              "on-error-container": "#93000a", "tertiary": "#002620", "surface-container": "#ebeef0",
              "surface": "#f7fafc", "secondary-fixed": "#93f2f2", "on-tertiary-fixed": "#00201a",
              "error-container": "#ffdad6", "on-primary-fixed-variant": "#2d476f", "surface-container-high": "#e5e9eb",
              "surface-bright": "#f7fafc", "outline-variant": "#c4c6cf", "on-tertiary": "#ffffff",
              "secondary-container": "#90efef", "surface-container-lowest": "#ffffff", "on-surface": "#181c1e",
              "outline": "#74777f", "on-secondary-container": "#006e6e", "primary-container": "#1a365d",
              "inverse-surface": "#2d3133", "primary-fixed-dim": "#adc7f7", "on-surface-variant": "#43474e",
              "on-secondary-fixed-variant": "#004f4f", "inverse-on-surface": "#eef1f3", "on-secondary-fixed": "#002020",
              "surface-tint": "#455f88", "on-tertiary-fixed-variant": "#045044", "surface-container-highest": "#e0e3e5",
              "primary-fixed": "#d6e3ff", "inverse-primary": "#adc7f7", "secondary": "#006a6a",
              "on-secondary": "#ffffff", "surface-container-low": "#f1f4f6", "surface-dim": "#d7dadc",
              "on-tertiary-container": "#6cab9c", "on-background": "#181c1e", "tertiary-fixed-dim": "#93d3c3",
              "on-primary-fixed": "#001b3c", "background": "#f7fafc", "on-primary-container": "#86a0cd",
              "on-error": "#ffffff", "error": "#ba1a1a"
            },
            borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
            fontFamily: { "headline": ["Manrope"], "display": ["Manrope"], "body": ["Inter"], "label": ["Inter"] }
          },
        },
      }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .clinical-gradient {
            background: linear-gradient(135deg, #002045 0%, #1a365d 100%);
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
        }

        #toast {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%);
            padding: 14px 28px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 14px;
            z-index: 9999;
            display: none;
            box-shadow: 0 4px 24px rgba(0,0,0,0.12);
        }

            #toast.success {
                background: #1a365d;
                color: #fff;
            }

            #toast.error {
                background: #ba1a1a;
                color: #fff;
            }
    </style>
</head>
<body class="bg-surface font-body text-on-surface min-h-screen flex flex-col">

    <div id="toast"></div>

    <!-- Hero Background -->
    <div class="fixed inset-0 z-0">
        <div class="absolute inset-0 bg-surface/60 z-10"></div>
        <img class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDLEUX0XffEEKxJ4F-2xT5bimcAwRt_JioNBVgcI8SdWVqnnwCZLlfiwkJ9eraAfi4DNeb8Imw-mYMXeFYTEjhb8sKe-6mFUcFtWF_ctvhMMlYn1qntxbjVLbGQ9r-jZwmgYRJVV9r9NmPZz8TAevSOkY4TFWtIRFF77BraJlTzq0hmnuitVYDPeMSoeXt8rGipYK5TP_K5465HrKBXTplCgJ5NDbhhxZXXwDXD5aUS5FRGMnrAR54TMzCpH0dEpXHYyh3VhJqny_Y" />
    </div>

    <main class="relative z-20 flex-grow flex items-center justify-center px-4 py-12">
        <div class="w-full max-w-md">
            <div class="mb-6">
                <a class="inline-flex items-center gap-2 text-sm font-semibold text-primary/70 hover:text-primary transition-colors" href="index.html">
                    <span class="material-symbols-outlined text-lg">arrow_back</span>Back to Home
                </a>
            </div>

            <!-- Branding -->
            <div class="text-center mb-10">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-xl bg-primary text-white mb-6 shadow-xl">
                    <span class="material-symbols-outlined text-4xl">medical_services</span>
                </div>
                <h1 class="font-display font-extrabold text-3xl text-primary tracking-tight">SehhaTech</h1>
                <p class="font-body text-on-surface-variant mt-2 font-medium tracking-wide">Enter your credentials to access the portal</p>
            </div>

            <!-- Login Card -->
            <div class="glass-panel border-none rounded-xl shadow-2xl overflow-hidden p-8 md:p-10">
                <form class="space-y-6" onsubmit="return false;">
                    <!-- Email -->
                    <div class="space-y-2">
                        <label class="block font-label text-xs font-bold uppercase tracking-widest text-primary-container">Email Address</label>
                        <div class="relative">
                            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">mail</span>
                            <input id="email" class="w-full pl-12 pr-4 py-3.5 bg-surface-container-highest text-on-surface rounded-lg focus:ring-2 focus:ring-primary outline-none transition-all border-none placeholder:text-outline/60"
                                   placeholder="dr.ahmed@yourclinic.com" type="email" />
                        </div>
                    </div>

                    <!-- Password -->
                    <div class="space-y-2">
                        <div class="flex justify-between items-center">
                            <label class="block font-label text-xs font-bold uppercase tracking-widest text-primary-container">Password</label>
                            <a class="text-xs font-semibold text-secondary hover:text-on-secondary-container transition-colors" href="reset-password.html">Forgot password?</a>
                        </div>
                        <div class="relative">
                            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">lock</span>
                            <input id="password" class="w-full pl-12 pr-12 py-3.5 bg-surface-container-highest text-on-surface rounded-lg focus:ring-2 focus:ring-primary outline-none transition-all border-none placeholder:text-outline/60"
                                   placeholder="••••••••••••" type="password" />
                            <button onclick="togglePassword()" class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-primary transition-colors" type="button">
                                <span id="eyeIcon" class="material-symbols-outlined">visibility</span>
                            </button>
                        </div>
                    </div>

                    <!-- Remember Me -->
                    <div class="flex items-center">
                        <input class="w-4 h-4 rounded border-outline-variant text-primary focus:ring-primary cursor-pointer" id="remember" type="checkbox" />
                        <label class="ml-2 text-sm font-medium text-on-surface-variant cursor-pointer select-none" for="remember">Stay logged in on this device</label>
                    </div>

                    <!-- Login Button -->
                    <button id="loginBtn" onclick="handleLogin()" type="button"
                            class="w-full clinical-gradient text-on-primary font-headline font-bold py-4 rounded-lg shadow-lg hover:shadow-primary/20 active:scale-95 transition-all flex items-center justify-center gap-3">
                        <span id="btnText">Login</span>
                        <span id="btnIcon" class="material-symbols-outlined text-xl">login</span>
                    </button>
                </form>
            </div>

            <!-- Footer Meta -->
            <div class="mt-8 flex flex-col items-center gap-6">
                <a class="inline-flex items-center gap-2 text-sm font-semibold text-primary hover:opacity-80 transition-opacity" href="#">
                    <span class="material-symbols-outlined text-lg">help</span>Need help?
                </a>
                <div class="flex items-center gap-6 opacity-60">
                    <div class="flex items-center gap-1.5 grayscale hover:grayscale-0 transition-all cursor-default">
                        <span class="material-symbols-outlined text-sm">verified_user</span>
                        <span class="font-label text-[10px] font-extrabold uppercase tracking-widest">HIPAA Compliant</span>
                    </div>
                    <div class="flex items-center gap-1.5 grayscale hover:grayscale-0 transition-all cursor-default">
                        <span class="material-symbols-outlined text-sm">lock_person</span>
                        <span class="font-label text-[10px] font-extrabold uppercase tracking-widest">SSL Secured</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="relative z-20 w-full py-8 text-center border-t border-outline-variant/10">
        <p class="text-xs font-medium text-on-surface-variant/40">© 2026 SehhaTech Clinical Systems. All Patient Data Encrypted.</p>
    </footer>

    <script>
        const API_BASE = "http://localhost:5099";

        function showToast(message, type = "success") {
            const toast = document.getElementById("toast");
            toast.textContent = message;
            toast.className = type;
            toast.style.display = "block";
            setTimeout(() => { toast.style.display = "none"; }, 4000);
        }

        function setLoading(loading) {
            const btn  = document.getElementById("loginBtn");
            const text = document.getElementById("btnText");
            const icon = document.getElementById("btnIcon");
            btn.disabled = loading;
            if (loading) {
                text.textContent = "Please wait...";
                icon.textContent = "hourglass_empty";
            } else {
                text.textContent = "Login";
                icon.textContent = "login";
            }
        }

        function togglePassword() {
            const input = document.getElementById("password");
            const icon  = document.getElementById("eyeIcon");
            if (input.type === "password") {
                input.type = "text";
                icon.textContent = "visibility_off";
            } else {
                input.type = "password";
                icon.textContent = "visibility";
            }
        }

        function redirectByRole(role) {
            switch (role) {
                case "SuperAdmin":   window.location.href = "super-admin-dashboard.html"; break;
                case "ClinicAdmin":  window.location.href = "admin-dashboard.html";       break;
                case "Doctor":       window.location.href = "doctor-dashboard.html";      break;
                case "Receptionist": window.location.href = "receptionist-dashboard.html"; break;
                default:             window.location.href = "dashboard.html";             break;
            }
        }

        async function handleLogin() {
            const email    = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value;
            const remember = document.getElementById("remember").checked;

            if (!email || !password) {
                showToast("Please enter your email and password.", "error");
                return;
            }

            setLoading(true);

            try {
                const res = await fetch(`${API_BASE}/api/auth/login`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, password }),
                });

                const data = await res.json();

                if (!res.ok) {
                    showToast(data.message || "Login failed. Please try again.", "error");
                    return;
                }

                // حفظ الـ token
                const storage = remember ? localStorage : sessionStorage;
                storage.setItem("token",    data.token);
                storage.setItem("fullName", data.fullName);
                storage.setItem("email",    data.email);
                storage.setItem("role",     data.role);
                if (data.tenantId) storage.setItem("tenantId", data.tenantId);

                // لو محتاج يغير الباسورد
                if (data.mustResetPassword) {
                    sessionStorage.setItem("resetEmail", data.email);
                    window.location.href = "reset-password.html";
                    return;
                }

                showToast("Login successful! Redirecting...", "success");
                setTimeout(() => redirectByRole(data.role), 1000);

            } catch (err) {
                showToast("Network error. Please check your connection.", "error");
            } finally {
                setLoading(false);
            }
        }
    </script>
</body>
</html>
